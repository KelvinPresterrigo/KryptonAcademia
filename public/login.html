<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Academia Krypton</title>
  <link rel="icon" type="image/png" href="/public/logo.png"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Nunito+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root { --green: #2dff7a; --green-d: #1ad962; --dark: #0a0a0a; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark);
      color: #fff;
      font-family: 'Nunito Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background-image:
        linear-gradient(to bottom, rgba(0,0,0,.85), rgba(0,0,0,.75)),
        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1800&q=85') center/cover no-repeat;
    }
    .card-login {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 440px;
      backdrop-filter: blur(12px);
    }
    .brand { font-family: 'Nunito Sans', sans-serif; font-weight: 800; font-size: 1rem; letter-spacing: 1.5px; text-transform: uppercase; color: #fff; text-decoration: none; }
    .brand img { width: 60px; height: 60px; object-fit: contain; }
    h2 { font-family: 'Oswald', sans-serif; font-size: 1.9rem; font-weight: 700; text-transform: uppercase; }
    h2 span { color: var(--green); }
    .form-control {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.15);
      color: #fff;
      border-radius: 8px;
      padding: .7rem 1rem;
      font-family: 'Nunito Sans', sans-serif;
      font-size: .9rem;
      transition: border-color .2s, background .2s;
    }
    .form-control:focus { background: rgba(255,255,255,.1); border-color: var(--green); box-shadow: 0 0 0 3px rgba(45,255,122,.15); color: #fff; }
    .form-control::placeholder { color: rgba(255,255,255,.35); }
    /* Fix cor do input date no dark mode */
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1) opacity(.5); cursor: pointer; }
    .form-label { font-size: .82rem; font-weight: 700; letter-spacing: .5px; color: rgba(255,255,255,.6); margin-bottom: .35rem; }
    .hint { font-size: .75rem; color: rgba(255,255,255,.35); margin-top: .25rem; }
    .btn-submit {
      background: var(--green);
      color: #000;
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 800;
      font-size: .85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      padding: .85rem;
      width: 100%;
      transition: background .2s, transform .15s;
      box-shadow: 0 0 24px rgba(45,255,122,.2);
    }
    .btn-submit:hover { background: var(--green-d); transform: translateY(-1px); }
    .btn-submit:disabled { opacity: .6; transform: none; cursor: not-allowed; }
    .divider { border-color: rgba(255,255,255,.1); }
    .link-alt { color: var(--green); text-decoration: none; font-weight: 700; }
    .link-alt:hover { color: var(--green-d); }
    .alert-msg {
      border-radius: 8px;
      padding: .75rem 1rem;
      font-size: .85rem;
      display: none;
      margin-bottom: 1rem;
    }
    .alert-erro  { background: rgba(220,53,69,.15);  border: 1px solid rgba(220,53,69,.4);  color: #ff8080; }
    .alert-ok    { background: rgba(45,255,122,.1);  border: 1px solid rgba(45,255,122,.3); color: var(--green); }
    .tab-btn {
      background: transparent;
      border: none;
      color: rgba(255,255,255,.45);
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 700;
      font-size: .88rem;
      padding: .45rem 1.1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: color .2s, background .2s;
    }
    .tab-btn.active { background: rgba(45,255,122,.12); color: var(--green); }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card-login">

  <!-- Brand -->
  <a href="/" class="brand d-flex align-items-center gap-4 mb-4 text-decoration-none">
    <img src="/logo.png" alt="Logo Krypton"/> Academia Krypton
  </a>
  

  <!-- Tabs -->
  <div class="d-flex gap-2 mb-4">
    <button class="tab-btn active" id="tab-login"    onclick="mostrarAba('login')">Entrar</button>
    <button class="tab-btn"        id="tab-cadastro" onclick="mostrarAba('cadastro')">Criar Conta</button>
  </div>

  <!-- Alertas -->
  <div id="alerta-erro" class="alert-msg alert-erro"></div>
  <div id="alerta-ok"   class="alert-msg alert-ok"></div>

  <!-- ══ Formulário Login ══════════════════════════════════════════════════ -->
  <form id="form-login">
    <h2 class="mb-1">Bem-<span>vindo</span></h2>
    <p class="mb-4" style="color:rgba(255,255,255,.5);font-size:.88rem;">Acesse seu plano e acompanhe sua evolução.</p>

    <div class="mb-3">
      <label class="form-label">E-mail</label>
      <input type="email" id="login-email" class="form-control" placeholder="seu@email.com" required/>
    </div>
    <div class="mb-4">
      <label class="form-label">Senha</label>
      <input type="password" id="login-senha" class="form-control" placeholder="••••••••" required/>
    </div>
    <button type="submit" class="btn-submit" id="btn-login">
      <span id="btn-login-txt">Entrar</span>
      <span id="btn-login-load" style="display:none"><i class="bi bi-arrow-repeat" style="animation:spin .8s linear infinite"></i> Entrando...</span>
    </button>
  </form>

  <!-- ══ Formulário Cadastro ═══════════════════════════════════════════════ -->
  <form id="form-cadastro" style="display:none">
    <h2 class="mb-1">Criar <span>Conta</span></h2>
    <p class="mb-4" style="color:rgba(255,255,255,.5);font-size:.88rem;">Junte-se à Academia Krypton.</p>

    <div class="mb-3">
      <label class="form-label">Nome completo</label>
      <input type="text" id="cad-nome" class="form-control" placeholder="João Silva" required/>
    </div>
    <div class="mb-3">
      <label class="form-label">E-mail</label>
      <input type="email" id="cad-email" class="form-control" placeholder="seu@email.com" required/>
    </div>
    <div class="mb-3">
      <label class="form-label">Data de nascimento</label>
      <input type="date" id="cad-nasc" class="form-control" required/>
      <!-- aviso de idade mínima visível ao usuário -->
      <p class="hint"><i class="bi bi-info-circle"></i> Idade mínima: 14 anos.</p>
    </div>
    <div class="mb-4">
      <label class="form-label">Senha <span style="color:rgba(255,255,255,.35)">(mín. 6 caracteres)</span></label>
      <input type="password" id="cad-senha" class="form-control" placeholder="••••••••" required minlength="6"/>
    </div>
    <button type="submit" class="btn-submit" id="btn-cadastro">
      <span id="btn-cad-txt">Criar Conta</span>
      <span id="btn-cad-load" style="display:none"><i class="bi bi-arrow-repeat" style="animation:spin .8s linear infinite"></i> Criando...</span>
    </button>
  </form>

  <hr class="divider my-4"/>
  <p class="text-center" style="font-size:.83rem;color:rgba(255,255,255,.45);">
    <span id="txt-alt-login">Não tem conta? <a href="#" class="link-alt" onclick="mostrarAba('cadastro')">Criar agora</a></span>
    <span id="txt-alt-cad" style="display:none">Já tem conta? <a href="#" class="link-alt" onclick="mostrarAba('login')">Entrar</a></span>
  </p>
</div>

<script>
  // ── Aba ──────────────────────────────────────────────────────────────────────
  function mostrarAba(aba) {
    const login = aba === 'login';
    document.getElementById('form-login').style.display    = login ? '' : 'none';
    document.getElementById('form-cadastro').style.display = login ? 'none' : '';
    document.getElementById('tab-login').classList.toggle('active', login);
    document.getElementById('tab-cadastro').classList.toggle('active', !login);
    document.getElementById('txt-alt-login').style.display = login ? '' : 'none';
    document.getElementById('txt-alt-cad').style.display   = login ? 'none' : '';
    esconderAlertas();
  }

  function mostrarErro(msg) {
    const el = document.getElementById('alerta-erro');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
    document.getElementById('alerta-ok').style.display = 'none';
  }
  function mostrarOk(msg) {
    const el = document.getElementById('alerta-ok');
    el.textContent = '✓ ' + msg;
    el.style.display = 'block';
    document.getElementById('alerta-erro').style.display = 'none';
  }
  function esconderAlertas() {
    document.getElementById('alerta-erro').style.display = 'none';
    document.getElementById('alerta-ok').style.display   = 'none';
  }

  function setLoading(form, on) {
    if (form === 'login') {
      document.getElementById('btn-login-txt').style.display  = on ? 'none' : '';
      document.getElementById('btn-login-load').style.display = on ? '' : 'none';
      document.getElementById('btn-login').disabled = on;
    } else {
      document.getElementById('btn-cad-txt').style.display  = on ? 'none' : '';
      document.getElementById('btn-cad-load').style.display = on ? '' : 'none';
      document.getElementById('btn-cadastro').disabled = on;
    }
  }

  // ── Login ────────────────────────────────────────────────────────────────────
  document.getElementById('form-login').addEventListener('submit', async e => {
    e.preventDefault();
    esconderAlertas();
    setLoading('login', true);
    try {
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({
          email: document.getElementById('login-email').value,
          senha: document.getElementById('login-senha').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) { mostrarErro(data.erro); return; }
      localStorage.setItem('token', data.token);
      localStorage.setItem('usuario', JSON.stringify(data.usuario));
      window.location.href = '/dashboard.html';
    } catch { mostrarErro('Sem conexão com o servidor.'); }
    finally  { setLoading('login', false); }
  });

  // ── Cadastro ─────────────────────────────────────────────────────────────────
  document.getElementById('form-cadastro').addEventListener('submit', async e => {
    e.preventDefault();
    esconderAlertas();

    // RN01 — validação de idade mínima no frontend também
    const nasc  = new Date(document.getElementById('cad-nasc').value);
    const hoje  = new Date();
    let idade   = hoje.getFullYear() - nasc.getFullYear();
    const mes   = hoje.getMonth() - nasc.getMonth();
    if (mes < 0 || (mes === 0 && hoje.getDate() < nasc.getDate())) idade--;
    if (idade < 14) {
      mostrarErro('Você precisa ter pelo menos 14 anos para criar uma conta.');
      return;
    }

    setLoading('cad', true);
    try {
      const res  = await fetch('/api/auth/cadastro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({
          nome:             document.getElementById('cad-nome').value,
          email:            document.getElementById('cad-email').value,
          senha:            document.getElementById('cad-senha').value,
          data_nascimento:  document.getElementById('cad-nasc').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) { mostrarErro(data.erro); return; }
      localStorage.setItem('token', data.token);
      localStorage.setItem('usuario', JSON.stringify(data.usuario));
      window.location.href = '/escolher-plano.html';
    } catch { mostrarErro('Sem conexão com o servidor.'); }
    finally  { setLoading('cad', false); }
  });
</script>
</body>
</html>
